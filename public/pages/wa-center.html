<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/css/design-system.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/responsive.css"/>
  <title>Pusat WhatsApp — POS Laundry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --wa: #25D366; --wa-dk: #128c7e; --wa-lt: #ECFDF5; }
    body {
      font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      background: var(--gray-2);
      color: var(--gray-9);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Sticky page header ── */
    .pg-head {
      position: sticky; top: 0; z-index: 18;
      background: #fff;
      border-bottom: 1px solid var(--gray-3);
      padding: 12px 14px;
    }
    .pg-head-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .pg-title {
      font-size: 17px; font-weight: 800; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ico-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--gray-3);
      background: #fff; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--gray-7);
    }
    .ico-btn:hover { background: var(--gray-1); }

    /* ── WA Mode toggle ── */
    .wa-mode {
      display: flex; gap: 0;
      border: 1.5px solid var(--gray-3);
      border-radius: 10px; overflow: hidden;
    }
    .wa-mode-btn {
      flex: 1; padding: 9px 6px;
      font-size: 12px; font-weight: 700;
      border: none; background: var(--gray-1);
      color: var(--gray-5); cursor: pointer;
      transition: all .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      min-height: 40px;
    }
    .wa-mode-btn:first-child { border-right: 1px solid var(--gray-3); }
    .wa-mode-btn.active { background: var(--wa-lt); color: var(--wa-dk); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; gap: 0;
      background: #fff;
      border-bottom: 1px solid var(--gray-3);
      position: sticky; top: 0; z-index: 17;
      padding: 0 14px;
    }
    .tab-bar.is-with-header { top: 121px; }
    .tab-btn {
      flex: 1; padding: 12px 10px;
      font-size: 13px; font-weight: 700;
      border: none; background: none;
      color: var(--gray-5); cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn:hover { color: var(--gray-9); }
    .tab-btn.active {
      color: var(--wa-dk);
      border-bottom-color: var(--wa);
    }

    /* ── Page content ── */
    .page {
      padding: 12px 14px 40px;
    }
    @media (min-width: 1024px) {
      .page {
        max-width: 1200px; margin: 0 auto;
        display: grid; grid-template-columns: 1fr 360px; gap: 20px;
        padding: 16px 20px 40px;
      }
    }

    .tab-sec { display: none; }
    .tab-sec.active { display: block; }

    /* ── Cards generic ── */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--gray-3);
      box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,.06));
    }
    .card-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-3);
      font-weight: 700; font-size: 14px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-body { padding: 14px 16px; }

    /* ── Tagihan list ── */
    .tag-list { display: flex; flex-direction: column; gap: 10px; }
    .tag-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--gray-3);
      border-left: 4px solid var(--danger);
      box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,.06));
      padding: 12px 14px;
    }
    .tag-card.proses { border-left-color: var(--primary); }
    .tag-card.selesai { border-left-color: var(--success); }
    .tag-row1 {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 10px; margin-bottom: 4px;
    }
    .tag-nama { font-size: 15px; font-weight: 700; color: var(--gray-9); }
    .tag-phone {
      font-size: 12px; color: var(--gray-5);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .tag-phone:hover { color: var(--wa-dk); }
    .tag-row2 {
      display: flex; gap: 10px; flex-wrap: wrap;
      align-items: center;
      font-size: 13px; margin-bottom: 6px;
    }
    .tag-nomor {
      color: var(--primary); font-weight: 700;
      text-decoration: none;
    }
    .tag-amount { color: var(--danger); font-weight: 800; }
    .tag-row3 {
      display: flex; gap: 8px; align-items: center;
      font-size: 12px; color: var(--gray-5);
      margin-bottom: 10px;
    }
    .tag-status {
      display: inline-flex; align-items: center; gap: 4px;
    }
    .tag-status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .tag-status.pending .dot { background: var(--warning); }
    .tag-status.proses  .dot { background: var(--primary); }
    .tag-status.selesai .dot { background: var(--success); }
    .tag-status.lewat   .dot { background: var(--danger); }
    .btn {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid transparent;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn-wa { background: var(--wa); color: #fff; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; border-color: var(--gray-3); color: var(--gray-7); }
    .btn-ghost { background: none; border: none; color: var(--gray-5); cursor: pointer; }
    .btn-block { width: 100%; }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 50px 20px;
      color: var(--gray-5);
    }
    .empty .ico { font-size: 44px; margin-bottom: 10px; opacity: .5; }
    .empty .ttl { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--gray-7); }
    .empty .sub { font-size: 13px; }

    /* ── Broadcast templates ── */
    .bc-tpl-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .bc-tpl-row::-webkit-scrollbar { display: none; }
    .bc-tpl {
      flex-shrink: 0;
      padding: 8px 14px;
      background: #fff;
      border: 1.5px solid var(--gray-3);
      border-radius: 99px;
      font-size: 12px; font-weight: 600;
      color: var(--gray-7);
      cursor: pointer;
      white-space: nowrap;
    }
    .bc-tpl.active {
      background: var(--primary); border-color: var(--primary);
      color: #fff;
    }

    /* Filter chips */
    .filter-chips {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 6px;
    }
    .filter-chip {
      padding: 6px 12px;
      background: #fff;
      border: 1.5px solid var(--gray-3);
      border-radius: 99px;
      font-size: 12px; font-weight: 600;
      color: var(--gray-7); cursor: pointer;
    }
    .filter-chip.active {
      background: var(--primary-lt);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Form */
    .fg { margin-bottom: 14px; }
    .fg label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--gray-7); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .bc-textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--gray-3);
      border-radius: 10px;
      font-size: 14px;
      resize: vertical; min-height: 140px;
      font-family: inherit; outline: none;
      background: #fff;
    }
    .bc-textarea:focus { border-color: var(--primary); }

    .var-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 8px;
    }
    .var-chip {
      padding: 4px 10px;
      background: var(--primary-lt);
      color: var(--primary);
      border-radius: 6px;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .var-chip:hover { background: var(--primary); color: #fff; }
    .preview-count { font-size: 12px; color: var(--gray-5); margin-top: 8px; }

    /* Preview box */
    .bc-preview {
      background: var(--wa-lt);
      border: 1px solid #c7e9d5;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: var(--gray-9);
      white-space: pre-wrap;
      max-height: 180px; overflow-y: auto;
      margin-bottom: 10px;
    }
    .bc-preview.empty {
      color: var(--gray-5); font-style: italic;
      background: var(--gray-1); border-color: var(--gray-3);
    }
    .bc-preview-h {
      font-size: 11px; font-weight: 700; color: var(--gray-5);
      text-transform: uppercase; letter-spacing: .4px;
      margin-bottom: 6px;
    }

    /* ── Riwayat timeline ── */
    .tl { padding: 6px 14px 14px; }
    .tl-item {
      display: flex; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-2);
    }
    .tl-item:last-child { border-bottom: none; }
    .tl-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--wa); margin-top: 6px;
      flex-shrink: 0;
    }
    .tl-body { flex: 1; min-width: 0; }
    .tl-line1 {
      display: flex; justify-content: space-between; gap: 8px;
      font-size: 13px; font-weight: 700;
      color: var(--gray-9);
      margin-bottom: 2px;
    }
    .tl-time { font-size: 11px; color: var(--gray-5); font-weight: 600; white-space: nowrap; }
    .tl-line2 {
      font-size: 12px; color: var(--gray-5);
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* Pagination */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-top: 1px solid var(--gray-3);
      font-size: 12px; color: var(--gray-5);
      flex-wrap: wrap; gap: 6px;
    }
    .pag-btns { display: flex; gap: 4px; }
    .pag-btn {
      padding: 4px 10px;
      border: 1px solid var(--gray-3); border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 12px;
    }
    .pag-btn:hover:not(:disabled) { background: var(--gray-2); }
    .pag-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pag-btn.active {
      background: var(--primary); color: #fff;
      border-color: var(--primary);
    }

    /* ── Stepper bottom sheet ── */
    .lm-bg {
      display: none; position: fixed !important;
      inset: 0; background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .lm-bg.open { display: flex; }
    .lm {
      background: #fff;
      border-radius: 16px 16px 0 0;
      width: 100%; max-width: 100%;
      max-height: 92vh; overflow: hidden;
      display: flex; flex-direction: column;
      animation: lmUp .22s ease;
    }
    @keyframes lmUp {
      from { transform: translateY(20px); opacity: .6; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .lm-h {
      background: var(--wa); color: #fff;
      padding: 14px 18px;
    }
    .lm-h h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .lm-progress {
      height: 5px; background: rgba(255,255,255,.3);
      border-radius: 4px; overflow: hidden;
    }
    .lm-progress-bar {
      height: 100%; background: #fff;
      width: 0%; transition: width .3s;
    }
    .lm-b { padding: 18px; flex: 1; overflow-y: auto; }
    .lm-f {
      padding: 12px 18px;
      border-top: 1px solid var(--gray-3);
      display: flex; gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    @media (min-width: 1024px) {
      .lm-bg { align-items: center; padding: 16px; }
      .lm { max-width: 480px; border-radius: 14px; }
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: #111; color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity .25s;
      max-width: calc(100vw - 32px);
      text-align: center;
    }
    #toast.show { opacity: 1; }
    #toast.err { background: var(--danger); }
    @media (min-width: 1024px) {
      #toast { bottom: 24px; }
    }

    /* Desktop sidebar */
    .right-col { display: none; }
    @media (min-width: 1024px) {
      .left-col { min-width: 0; }
      .right-col { display: block; }
      .right-col .card { position: sticky; top: 80px; }
      .right-col .tl { max-height: calc(100vh - 200px); overflow-y: auto; }
      .tab-bar.is-with-header { top: 0; }
      .tab-bar.tab-bar-desktop {
        position: static;
        background: transparent;
        border: none;
        padding: 0;
        margin-bottom: 16px;
        border-bottom: 2px solid var(--gray-3);
      }
      .pg-head { padding: 14px 20px; }
    }

    /* Mobile-only / desktop-only */
    .mobile-only { display: block; }
    .desktop-only { display: none; }
    @media (min-width: 1024px) {
      .mobile-only { display: none; }
      .desktop-only { display: block; }
    }
  </style>
</head>
<body>

<!-- ── Sticky Header ── -->
<div class="pg-head">
  <div class="pg-head-row">
    <div class="pg-title">📱 Pusat WhatsApp</div>
  </div>
  <div class="wa-mode" role="group" aria-label="Mode WhatsApp">
    <button class="wa-mode-btn" id="waModeRegular" onclick="setWAMode('regular')">💬 WA Biasa</button>
    <button class="wa-mode-btn active" id="waModeBusiness" onclick="setWAMode('business')">💼 WA Business</button>
  </div>
</div>

<!-- ── Tab bar (mobile) ── -->
<div class="tab-bar mobile-only" id="tabBar">
  <button class="tab-btn active" data-tab="tagihan" onclick="switchTab('tagihan')">
    💰 Tagihan
  </button>
  <button class="tab-btn" data-tab="broadcast" onclick="switchTab('broadcast')">
    📢 Broadcast
  </button>
  <button class="tab-btn" data-tab="riwayat" onclick="switchTab('riwayat')">
    📋 Riwayat
  </button>
</div>

<div class="page">
  <div class="left-col">

    <!-- Desktop tabs -->
    <div class="tab-bar tab-bar-desktop desktop-only">
      <button class="tab-btn active" data-tab="tagihan" onclick="switchTab('tagihan')">💰 Tagihan Belum Lunas</button>
      <button class="tab-btn" data-tab="broadcast" onclick="switchTab('broadcast')">📢 Broadcast</button>
    </div>

    <!-- ── TAB: Tagihan ── -->
    <div class="tab-sec active" id="sec-tagihan">
      <div class="card" style="margin-bottom:14px">
        <div class="card-head">
          💸 Order Belum Lunas
          <button class="btn btn-outline btn-sm" onclick="loadTagihan()">↻ Refresh</button>
        </div>
        <div class="card-body" id="tagihanBody">
          <div class="empty">
            <div class="ico">⏳</div>
            <div class="ttl">Memuat...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── TAB: Broadcast ── -->
    <div class="tab-sec" id="sec-broadcast">
      <div class="card" style="margin-bottom:14px">
        <div class="card-head">📢 Broadcast Pesan WA</div>
        <div class="card-body">
          <!-- Template pills -->
          <div class="fg">
            <label>Template</label>
            <div class="bc-tpl-row">
              <button class="bc-tpl active" data-tpl="custom" onclick="setTemplate('custom')">✏️ Custom</button>
              <button class="bc-tpl" data-tpl="promo" onclick="setTemplate('promo')">🎉 Promo</button>
              <button class="bc-tpl" data-tpl="pengingat" onclick="setTemplate('pengingat')">⏰ Pengingat</button>
              <button class="bc-tpl" data-tpl="ucapan" onclick="setTemplate('ucapan')">💌 Ucapan</button>
            </div>
          </div>

          <!-- Pesan -->
          <div class="fg">
            <label>Pesan Broadcast</label>
            <textarea class="bc-textarea" id="bcMsg" placeholder="Ketik pesan broadcast...

Variabel: {nama}, {poin}, {level}"
              oninput="updatePreview()"></textarea>
            <div class="var-chips">
              <span style="font-size:11px;color:var(--gray-5);align-self:center">Sisipkan:</span>
              <button class="var-chip" onclick="insertVar('{nama}')">📛 nama</button>
              <button class="var-chip" onclick="insertVar('{poin}')">⭐ poin</button>
              <button class="var-chip" onclick="insertVar('{level}')">🏅 level</button>
            </div>
          </div>

          <!-- Penerima -->
          <div class="fg">
            <label>Pilih Penerima</label>
            <div class="filter-chips" id="bcFilterChips">
              <button class="filter-chip active" data-f="all" onclick="setBcFilter('all')">Semua</button>
              <button class="filter-chip" data-f="bronze" onclick="setBcFilter('bronze')">🥉 Bronze</button>
              <button class="filter-chip" data-f="silver" onclick="setBcFilter('silver')">🥈 Silver</button>
              <button class="filter-chip" data-f="gold" onclick="setBcFilter('gold')">🥇 Gold</button>
              <button class="filter-chip" data-f="platinum" onclick="setBcFilter('platinum')">💎 Platinum</button>
            </div>
            <div id="bcCountWrap" style="font-size:12px;color:var(--gray-5);margin-top:8px">Menghitung target...</div>
          </div>

          <!-- Preview -->
          <div class="fg">
            <label>Preview Pesan</label>
            <div class="bc-preview-h">Contoh untuk pelanggan pertama:</div>
            <div class="bc-preview empty" id="bcPreview">(Ketik pesan untuk melihat preview...)</div>
          </div>

          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-wa btn-block" onclick="startBroadcast()" style="flex:1">📤 Kirim Broadcast</button>
            <button class="btn btn-outline btn-sm" onclick="loadBcCount()">↻</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── TAB: Riwayat (mobile) ── -->
    <div class="tab-sec mobile-only" id="sec-riwayat">
      <div class="card">
        <div class="card-head">
          📋 Riwayat WA
          <button class="btn btn-outline btn-sm" onclick="loadLog(1)">↻</button>
        </div>
        <div class="tl" id="logBodyMobile">
          <div class="empty">
            <div class="ico">⏳</div>
            <div class="ttl">Memuat...</div>
          </div>
        </div>
        <div class="pagination" id="logPagBarMobile" style="display:none">
          <span id="logPagInfoMobile"></span>
          <div class="pag-btns" id="logPagBtnsMobile"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Riwayat (desktop sidebar) ── -->
  <div class="right-col">
    <div class="card">
      <div class="card-head">
        📋 Riwayat WA
        <button class="btn btn-outline btn-sm" onclick="loadLog(1)">↻</button>
      </div>
      <div class="tl" id="logBodyDesktop">
        <div class="empty">
          <div class="ico">⏳</div>
          <div class="ttl">Memuat...</div>
        </div>
      </div>
      <div class="pagination" id="logPagBarDesktop" style="display:none">
        <span id="logPagInfoDesktop"></span>
        <div class="pag-btns" id="logPagBtnsDesktop"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Broadcast Stepper Modal ── -->
<div class="lm-bg" id="stepperModal">
  <div class="lm">
    <div class="lm-h">
      <h3>📢 Broadcast Pesan</h3>
      <div class="lm-progress">
        <div class="lm-progress-bar" id="stepperBar"></div>
      </div>
    </div>
    <div class="lm-b">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px" id="stepName">–</div>
      <div style="font-size:13px;color:var(--gray-5);margin-bottom:14px" id="stepPhone">–</div>
      <div class="bc-preview" id="stepMsg" style="margin-bottom:0"></div>
    </div>
    <div class="lm-f">
      <div style="font-size:13px;color:var(--gray-5)" id="stepCounter"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="stepperSkip()">Lewati</button>
        <button class="btn btn-wa" id="stepSendBtn" onclick="stepperSend()">📱 Kirim WA</button>
        <button class="btn btn-ghost btn-sm" onclick="stepperClose()">Tutup</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Templates ─────────────────────────────────────────────────────────────────
const TEMPLATES = {
  custom: '',
  promo: `Halo {nama}! 🎉

Ada promo spesial untukmu di Nala Laundry minggu ini:
- Cuci kiloan diskon 20%
- Free antar jemput untuk wilayah sekitar

Yuk pesan sekarang. Tunjukkan WA ini ke kasir untuk klaim promo.

Terima kasih,
Nala Laundry`,
  pengingat: `Halo {nama},

Kami mengingatkan bahwa orderan Anda di Nala Laundry sudah siap diambil. Mohon dijemput agar tidak menumpuk di toko ya.

Terima kasih,
Nala Laundry`,
  ucapan: `Halo {nama}! 💌

Terima kasih sudah jadi pelanggan setia kami. Saldo poin Anda saat ini: {poin} (level {level}).

Selalu kami siap melayani cucian Anda 🙌

Salam,
Nala Laundry`
};

// ── State ─────────────────────────────────────────────────────────────────────
let logPage  = 1, logTotal = 1;
let bcData   = [];
let stepIdx  = 0;
let bcMsg    = '';
let waMode   = 'business';
let bcFilter = 'all';

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('sec-' + tab).classList.add('active');
  if (tab === 'riwayat') loadLog(1);
}

// ── WA Mode ───────────────────────────────────────────────────────────────────
function setWAMode(mode) {
  waMode = mode;
  document.getElementById('waModeRegular').classList.toggle('active', mode === 'regular');
  document.getElementById('waModeBusiness').classList.toggle('active', mode === 'business');
}

function buildWAUrl(telepon, teks, mode) {
  const clean = String(telepon).replace(/\D/g, '');
  const phone = clean.startsWith('62') ? clean
              : clean.startsWith('0')  ? '62' + clean.slice(1)
              : '62' + clean;
  const enc = encodeURIComponent(teks);
  return mode === 'business'
    ? `https://api.whatsapp.com/send?phone=${phone}&text=${enc}`
    : `https://wa.me/${phone}?text=${enc}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const m = await api('/api/v1/pengaturan/wa-mode');
    if (m.wa_mode) setWAMode(m.wa_mode);
  } catch {}
  loadTagihan();
  loadBcCount();
  loadLog(1);
})();

async function api(url, opts = {}) {
  const r = await fetch(url, { credentials:'include', headers:{'Content-Type':'application/json'}, ...opts });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'Error');
  return j;
}

// ── Tagihan ───────────────────────────────────────────────────────────────────
async function loadTagihan() {
  try {
    const { data } = await api('/api/v1/wa/tagihan');
    const el = document.getElementById('tagihanBody');
    if (!data.length) {
      el.innerHTML = `<div class="empty">
        <div class="ico">🎉</div>
        <div class="ttl">Semua tagihan sudah lunas!</div>
        <div class="sub">Tidak ada order yang perlu ditagih.</div>
      </div>`;
      return;
    }
    const today = new Date(); today.setHours(0,0,0,0);
    el.innerHTML = `<div class="tag-list">` + data.map(r => {
      const created = new Date(r.created_at || r.tanggal_terima || Date.now());
      const diffDays = Math.floor((today - created) / (1000 * 60 * 60 * 24));
      const ageTxt = diffDays === 0 ? 'hari ini'
                  : diffDays === 1 ? '1 hari lalu'
                  : `${diffDays} hari lalu`;
      const statusCls = (r.status || 'pending').toLowerCase();
      return `
        <div class="tag-card ${statusCls}">
          <div class="tag-row1">
            <div class="tag-nama">${esc(r.pelanggan_nama || 'Tanpa Nama')}</div>
            ${r.pelanggan_telepon
              ? `<a class="tag-phone" href="https://wa.me/${esc(r.pelanggan_telepon)}" target="_blank">📱 ${esc(r.pelanggan_telepon)}</a>`
              : '<span class="tag-phone">—</span>'}
          </div>
          <div class="tag-row2">
            <a href="/api/v1/transaksi/${r.id}/struk" target="_blank" class="tag-nomor">${esc(r.nomor_transaksi)}</a>
            <span>·</span>
            <span class="tag-amount">${rupiah(r.sisa_tagihan)}</span>
          </div>
          <div class="tag-row3">
            <span class="tag-status ${statusCls}"><span class="dot"></span> ${esc(r.status || 'pending').toUpperCase()}</span>
            <span>·</span>
            <span>${ageTxt}</span>
          </div>
          <button class="btn btn-wa btn-block" onclick="kirimTagihanWA(${r.id})">💬 Kirim Tagihan WA</button>
        </div>
      `;
    }).join('') + `</div>`;
  } catch (e) {
    toast(e.message, true);
    document.getElementById('tagihanBody').innerHTML = `<div class="empty">
      <div class="ico">⚠️</div>
      <div class="ttl" style="color:var(--danger)">Gagal memuat tagihan</div>
    </div>`;
  }
}

async function kirimTagihanWA(id) {
  try {
    const d = await api(`/api/v1/transaksi/${id}/wa/tagihan?mode=${waMode}`);
    if (!d.url) { toast('Tidak ada nomor WA', true); return; }
    window.open(d.url, '_blank');
    await fetch('/api/v1/wa/log', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        telepon: d.telepon, pesan: d.teks, transaksi_id: id,
        status:'terkirim', wa_mode: waMode
      })
    });
    toast(`WA tagihan dibuka untuk ${d.pelanggan}`);
    loadLog(1);
  } catch (e) { toast(e.message, true); }
}

// ── Broadcast ─────────────────────────────────────────────────────────────────
function setTemplate(key) {
  document.querySelectorAll('.bc-tpl').forEach(b => {
    b.classList.toggle('active', b.dataset.tpl === key);
  });
  if (key !== 'custom') {
    document.getElementById('bcMsg').value = TEMPLATES[key] || '';
  }
  updatePreview();
}

function setBcFilter(f) {
  bcFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.f === f);
  });
  loadBcCount();
}

async function loadBcCount() {
  try {
    const { total } = await api('/api/v1/wa/broadcast', {
      method: 'POST',
      body: JSON.stringify({ pesan: 'x', level_filter: bcFilter })
    });
    document.getElementById('bcCountWrap').textContent =
      `✅ ${total} pelanggan akan menerima pesan`;
  } catch {
    document.getElementById('bcCountWrap').textContent = '—';
  }
}

function insertVar(v) {
  const ta = document.getElementById('bcMsg');
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + v + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + v.length;
  ta.focus();
  updatePreview();
}

function updatePreview() {
  const msg = document.getElementById('bcMsg').value.trim();
  const el = document.getElementById('bcPreview');
  if (!msg) {
    el.textContent = '(Ketik pesan untuk melihat preview...)';
    el.classList.add('empty');
    return;
  }
  el.classList.remove('empty');
  // Demo preview with sample data
  const resolved = msg
    .replace(/\{nama\}/g, 'Pelanggan')
    .replace(/\{poin\}/g, '1250')
    .replace(/\{level\}/g, 'Silver');
  el.textContent = resolved;
}

async function startBroadcast() {
  const pesan = document.getElementById('bcMsg').value.trim();
  if (!pesan) { toast('Isi pesan terlebih dahulu', true); return; }
  try {
    const res = await api('/api/v1/wa/broadcast', {
      method: 'POST',
      body: JSON.stringify({ pesan, level_filter: bcFilter, mode: waMode })
    });
    if (!res.data?.length) { toast('Tidak ada target broadcast', true); return; }
    bcData  = res.data;
    bcMsg   = pesan;
    stepIdx = 0;
    document.getElementById('stepperModal').classList.add('open');
    updateStepper();
  } catch (e) { toast(e.message, true); }
}

function updateStepper() {
  if (stepIdx >= bcData.length) {
    document.getElementById('stepperModal').classList.remove('open');
    toast(`Broadcast selesai! ${bcData.length} pesan diproses`);
    return;
  }
  const target = bcData[stepIdx];
  const p = target.pelanggan;
  const resolved = bcMsg
    .replace(/\{nama\}/g, p.nama || '')
    .replace(/\{poin\}/g, p.total_poin || 0)
    .replace(/\{level\}/g, getLevel(p.total_poin || 0));
  document.getElementById('stepName').textContent    = p.nama;
  document.getElementById('stepPhone').textContent   = '📱 ' + p.telepon;
  document.getElementById('stepMsg').textContent     = resolved;
  document.getElementById('stepCounter').textContent = `${stepIdx + 1} / ${bcData.length}`;
  document.getElementById('stepperBar').style.width  = ((stepIdx / bcData.length) * 100) + '%';
  bcData[stepIdx]._resolved = resolved;
}

function stepperSend() {
  const target = bcData[stepIdx];
  const resolved = target._resolved || bcMsg;
  window.open(buildWAUrl(target.pelanggan.telepon, resolved, waMode), '_blank');
  fetch('/api/v1/wa/log', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      telepon: target.pelanggan.telepon, pesan: resolved,
      status:'terkirim', wa_mode: waMode
    })
  }).catch(() => {});
  stepIdx++;
  updateStepper();
  loadLog(1);
}

function stepperSkip()  { stepIdx++; updateStepper(); }
function stepperClose() {
  document.getElementById('stepperModal').classList.remove('open');
  bcData = []; stepIdx = 0;
}

// ── Riwayat log ───────────────────────────────────────────────────────────────
async function loadLog(p) {
  logPage = p;
  try {
    const d = await api(`/api/v1/wa/log-list?page=${p}&limit=20`);
    const items = d.data;
    const renderTl = (containerId, pagBarId, pagInfoId, pagBtnsId) => {
      const el = document.getElementById(containerId);
      if (!items.length) {
        el.innerHTML = `<div class="empty">
          <div class="ico">📭</div>
          <div class="ttl">Belum ada riwayat WA</div>
          <div class="sub">Pesan yang dikirim akan muncul di sini.</div>
        </div>`;
        document.getElementById(pagBarId).style.display = 'none';
        return;
      }
      el.innerHTML = items.map(r => `
        <div class="tl-item">
          <div class="tl-dot"></div>
          <div class="tl-body">
            <div class="tl-line1">
              <span>${r.pelanggan_nama ? esc(r.pelanggan_nama) : (r.telepon ? esc(r.telepon) : '—')}</span>
              <span class="tl-time">${fmtDt(r.created_at)}</span>
            </div>
            <div class="tl-line2">${esc(r.pesan || '')}</div>
          </div>
        </div>
      `).join('');

      const bar = document.getElementById(pagBarId);
      bar.style.display = 'flex';
      logTotal = Math.ceil(d.meta.total / d.meta.limit) || 1;
      document.getElementById(pagInfoId).textContent =
        `${(p-1)*d.meta.limit+1}–${Math.min(p*d.meta.limit, d.meta.total)} / ${d.meta.total}`;

      let pbtns = `<button class="pag-btn" onclick="loadLog(${p-1})" ${p<=1?'disabled':''}>‹</button>`;
      for (let i = Math.max(1,p-2); i <= Math.min(logTotal,p+2); i++) {
        pbtns += `<button class="pag-btn${i===p?' active':''}" onclick="loadLog(${i})">${i}</button>`;
      }
      pbtns += `<button class="pag-btn" onclick="loadLog(${p+1})" ${p>=logTotal?'disabled':''}>›</button>`;
      document.getElementById(pagBtnsId).innerHTML = pbtns;
    };

    renderTl('logBodyMobile',  'logPagBarMobile',  'logPagInfoMobile',  'logPagBtnsMobile');
    renderTl('logBodyDesktop', 'logPagBarDesktop', 'logPagInfoDesktop', 'logPagBtnsDesktop');
  } catch (e) { toast(e.message, true); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getLevel(poin) {
  if (poin >= 5000) return 'Platinum';
  if (poin >= 2000) return 'Gold';
  if (poin >= 500)  return 'Silver';
  return 'Bronze';
}
function rupiah(n) { return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }
function fmtDt(s) {
  if (!s) return '–';
  return new Date(s).toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Close stepper on backdrop click
document.getElementById('stepperModal').addEventListener('click', e => {
  if (e.target.id === 'stepperModal') stepperClose();
});
</script>
