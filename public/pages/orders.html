<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/css/design-system.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/responsive.css"/>
  <title>Antrian — POS Laundry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--gray-2); color: var(--gray-9); font-size: 14px; min-height: 100vh; }

    .page { max-width: 1200px; margin: 0 auto; padding: 0 0 calc(var(--bn-h, 64px) + 20px); }
    @media (min-width: 1024px) {
      .page { padding: 0 0 40px; }
    }

    /* ── Sticky Header ─────────────────────────────────── */
    .head {
      position: sticky; top: 0; z-index: 20;
      background: #fff; border-bottom: 1px solid var(--gray-3);
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .head .back, .head .ic-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--gray-1); color: var(--gray-7);
      border: none; cursor: pointer; flex-shrink: 0;
      font-size: 18px; display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    .head .back:hover, .head .ic-btn:hover { background: var(--gray-2); }
    .head .ttl { flex: 1; font-size: 16px; font-weight: 800; color: var(--gray-9); }

    /* ── Search bar (toggle) ───────────────────────────── */
    .search-bar {
      background: #fff; border-bottom: 1px solid var(--gray-3);
      padding: 10px 12px; display: none;
    }
    .search-bar.open { display: block; }
    .search-bar input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--gray-3);
      border-radius: 10px; font-size: 14px; font-family: inherit;
      background: var(--gray-1); color: var(--gray-9); outline: none;
    }
    .search-bar input:focus { border-color: var(--primary); background: #fff; }

    /* ── Filter pills ──────────────────────────────────── */
    .pill-wrap {
      background: #fff; border-bottom: 1px solid var(--gray-3);
      padding: 10px 12px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .pill-wrap::-webkit-scrollbar { display: none; }
    .pills { display: inline-flex; gap: 8px; white-space: nowrap; }
    .pill {
      padding: 8px 14px; border-radius: 99px;
      border: 1px solid var(--gray-3); background: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
      color: var(--gray-7); font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all .15s;
    }
    .pill:active { transform: scale(.97); }
    .pill .cnt {
      background: var(--gray-2); color: var(--gray-6);
      padding: 1px 7px; border-radius: 99px;
      font-size: 11px; font-weight: 800;
    }
    .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pill.active .cnt { background: rgba(255,255,255,.25); color: #fff; }
    .pill.danger.active { background: var(--danger); border-color: var(--danger); }
    .pill.warning.active { background: var(--warning); border-color: var(--warning); }

    /* ── Body ──────────────────────────────────────────── */
    .body-wrap { padding: 14px 12px; }

    .info-line {
      font-size: 12px; color: var(--gray-5);
      margin-bottom: 10px; padding: 0 2px;
    }

    /* ── Order card ────────────────────────────────────── */
    .order-card {
      background: #fff; border-radius: 12px; border: 1px solid var(--gray-3);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px; overflow: hidden;
      border-left: 3px solid var(--gray-4);
    }
    .order-card.s-pending { border-left-color: #94a3b8; }
    .order-card.s-proses  { border-left-color: #2563eb; }
    .order-card.s-selesai { border-left-color: #16a34a; }
    .order-card.s-lewat   { border-left-color: #dc2626; }
    .order-card.s-diambil { border-left-color: var(--gray-3); opacity: .85; }
    .order-card.s-dibatalkan { border-left-color: var(--gray-4); opacity: .7; }

    .oc-body { padding: 12px 14px; }
    .oc-row1 {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 4px;
    }
    .oc-nomor { font-size: 14px; font-weight: 800; color: var(--gray-9); line-height: 1.2; }
    .oc-tgl { font-size: 11px; color: var(--gray-5); white-space: nowrap; flex-shrink: 0; }
    .oc-nama { font-size: 13px; color: var(--gray-7); margin-bottom: 4px; line-height: 1.3; word-break: break-word; }
    .oc-nama .tel { color: var(--gray-5); }
    .oc-svc {
      font-size: 12px; color: var(--gray-6);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      margin-bottom: 8px; line-height: 1.3;
    }
    .oc-svc .layanan { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .oc-svc .total { font-weight: 800; color: var(--gray-9); white-space: nowrap; font-size: 13px; }
    .oc-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .oc-actions {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 10px 14px;
      border-top: 1px solid var(--gray-2);
      background: var(--gray-1);
      align-items: stretch;
    }
    .oc-actions .btn {
      flex: 1 1 auto; min-height: 40px; padding: 8px 10px; font-size: 12px;
      border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      text-decoration: none; font-family: inherit; min-width: 70px; white-space: nowrap;
    }
    .oc-actions .btn:active { transform: scale(.98); }
    .oc-actions a.btn-detail { flex: 0 0 44px; min-width: 44px; }
    .btn-proses  { background: var(--primary); color: #fff; }
    .btn-selesai { background: var(--success); color: #fff; }
    .btn-lunasi  { background: #16a34a; color: #fff; }
    .btn-wa      { background: #2563eb; color: #fff; }
    .btn-label   { background: #8b5cf6; color: #fff; }
    .btn-detail  { background: #fff; border-color: var(--gray-3); color: var(--gray-6); }

    /* ── Empty state ───────────────────────────────────── */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--gray-5);
      background: #fff; border-radius: 12px; border: 1px dashed var(--gray-3);
    }
    .empty .ic { font-size: 48px; display: block; margin-bottom: 8px; opacity: .8; }
    .empty .ttl { font-size: 14px; font-weight: 700; color: var(--gray-7); margin-bottom: 4px; }
    .empty .sub { font-size: 12px; margin-bottom: 14px; }
    .empty .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; background: var(--primary); color: #fff;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      text-decoration: none; border: none; cursor: pointer;
    }

    /* ── Pagination ────────────────────────────────────── */
    .pagination {
      display: flex; justify-content: center; align-items: center; gap: 6px;
      margin-top: 12px; flex-wrap: wrap;
    }
    .pg-btn {
      min-width: 36px; height: 36px; padding: 0 10px;
      border: 1px solid var(--gray-3); background: #fff;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700;
      font-family: inherit; color: var(--gray-7);
    }
    .pg-btn:hover:not(:disabled) { background: var(--gray-1); }
    .pg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pg-btn:disabled { opacity: .4; cursor: default; }

    /* ── Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--gray-9); color: #fff; padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    #toast.show { opacity: 1; }

    /* ── DESKTOP (>= 1024px): table view ──────────────── */
    .desktop-only { display: none; }
    .mobile-only { display: block; }

    @media (min-width: 1024px) {
      .desktop-only { display: block; }
      .mobile-only { display: none; }
      .body-wrap { padding: 20px; }
      .head { padding: 14px 20px; }
      .head .ttl { font-size: 20px; }
      .pill-wrap { padding: 14px 20px; }

      .table-card {
        background: #fff; border: 1px solid var(--gray-3); border-radius: 12px;
        overflow: hidden; box-shadow: var(--shadow-sm);
      }
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 900px; }
      thead th {
        padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .4px; color: var(--gray-5);
        background: var(--gray-1); border-bottom: 1px solid var(--gray-3);
        white-space: nowrap;
      }
      tbody tr { border-bottom: 1px solid var(--gray-3); transition: background .1s; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--gray-1); }
      tbody td { padding: 12px 14px; vertical-align: middle; font-size: 13px; }
      .td-nomor { font-weight: 700; white-space: nowrap; }
      .td-nomor a { color: var(--primary); text-decoration: none; }
      .td-nomor a:hover { text-decoration: underline; }
      .td-meta { font-size: 11px; color: var(--gray-5); margin-top: 2px; }
      .td-actions-cell { white-space: nowrap; }
      .td-actions-cell .btn {
        padding: 6px 10px; font-size: 12px; min-height: 32px;
        border-radius: 6px; font-weight: 700; cursor: pointer;
        display: inline-flex; align-items: center; gap: 4px;
        border: 1px solid transparent; text-decoration: none; font-family: inherit;
        margin-right: 4px;
      }
    }
  </style>
</head>
<body>

<div class="page">
  <!-- HEADER -->
  <div class="head">
    <a href="/dashboard" class="back" title="Kembali">←</a>
    <div class="ttl">Antrian</div>
    <button class="ic-btn" onclick="toggleSearch()" title="Cari">🔍</button>
  </div>

  <!-- SEARCH (toggle) -->
  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="Cari nomor order / nama pelanggan..."
           oninput="debounceLoad()"/>
  </div>

  <!-- FILTER PILLS -->
  <div class="pill-wrap">
    <div class="pills" id="pills">
      <button class="pill active" data-quick="semua">
        Semua <span class="cnt" id="cnt-semua">0</span>
      </button>
      <button class="pill" data-quick="aktif">
        Aktif <span class="cnt" id="cnt-aktif">0</span>
      </button>
      <button class="pill" data-quick="selesai">
        Selesai <span class="cnt" id="cnt-selesai">0</span>
      </button>
      <button class="pill danger" data-quick="lewat">
        🔴 Lewat Waktu <span class="cnt" id="cnt-lewat">0</span>
      </button>
      <button class="pill warning" data-quick="belum_lunas">
        💰 Belum Lunas <span class="cnt" id="cnt-belum_lunas">0</span>
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body-wrap">
    <div class="info-line" id="infoLine">Memuat...</div>

    <!-- MOBILE: card list -->
    <div class="mobile-only" id="cardList"></div>

    <!-- DESKTOP: table -->
    <div class="desktop-only">
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No. Order</th>
                <th>Pelanggan</th>
                <th>Layanan</th>
                <th>Total</th>
                <th>Bayar</th>
                <th>Status</th>
                <th>Est. Selesai</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Memuat...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const fmtRp = n => 'Rp ' + Number(n || 0).toLocaleString('id-ID');
const fmtDateShort = s => s ? new Date(s).toLocaleDateString('id-ID', { day:'2-digit', month:'short' }) : '—';
const fmtDate = s => s ? new Date(s).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }) : '—';
const escHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// Format nomor telepon untuk tampilan (628xxx → 08xxx)
function tampilkanNomor(nomor) {
  if (!nomor) return '';
  if (nomor.startsWith('628')) return '0' + nomor.slice(2);
  return nomor;
}

// Format nomor telepon untuk URL WA (08xxx → 62xxx)
function waUrl(nomor) {
  if (!nomor) return '';
  let n = nomor.replace(/\D/g, '');
  if (n.startsWith('0')) n = '62' + n.slice(1);
  if (!n.startsWith('62')) n = '62' + n;
  return n;
}

let currentPage = 1;
let totalPages  = 1;
let debTimer    = null;
let quickFilter = 'semua';

function showToast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
window.showToast = showToast;

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) {
    document.getElementById('searchInput').focus();
  } else {
    document.getElementById('searchInput').value = '';
    loadOrders(1);
  }
}

function debounceLoad() {
  clearTimeout(debTimer);
  debTimer = setTimeout(() => loadOrders(1), 400);
}

function isLewat(t) {
  if (!['pending','proses'].includes(t.status)) return false;
  if (!t.tanggal_selesai) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const est = new Date(t.tanggal_selesai); est.setHours(0,0,0,0);
  return est < today;
}

function payload(t) {
  return {
    id: t.id, nomor: t.nomor_transaksi, nama: t.pelanggan_nama,
    total: t.total_bayar, dibayar: t.bayar, pelanggan_id: t.pelanggan_id
  };
}
function waPayload(t) {
  return { id: t.id, nomor: t.nomor_transaksi, nama: t.pelanggan_nama, telepon: t.pelanggan_telepon };
}

async function loadCounts() {
  try {
    const [semua, pendR, prosR, selesai, belum, scan] = await Promise.all([
      fetch('/api/v1/transaksi?limit=1', { credentials: 'include' }).then(r => r.json()),
      fetch('/api/v1/transaksi?status=pending&limit=1', { credentials: 'include' }).then(r => r.json()),
      fetch('/api/v1/transaksi?status=proses&limit=1', { credentials: 'include' }).then(r => r.json()),
      fetch('/api/v1/transaksi?status=selesai&limit=1', { credentials: 'include' }).then(r => r.json()),
      fetch('/api/v1/transaksi?belum_lunas=1&limit=1', { credentials: 'include' }).then(r => r.json()),
      fetch('/api/v1/transaksi?limit=200', { credentials: 'include' }).then(r => r.json())
    ]);
    const aktifTotal = (pendR.meta?.total || 0) + (prosR.meta?.total || 0);
    const lewatCount = (scan.data || []).filter(isLewat).length;

    document.getElementById('cnt-semua').textContent = semua.meta?.total || 0;
    document.getElementById('cnt-aktif').textContent = aktifTotal;
    document.getElementById('cnt-selesai').textContent = selesai.meta?.total || 0;
    document.getElementById('cnt-belum_lunas').textContent = belum.meta?.total || 0;
    document.getElementById('cnt-lewat').textContent = lewatCount;
  } catch {}
}

async function loadOrders(page = 1) {
  currentPage = page;
  const q = document.getElementById('searchInput').value.trim();

  let status = '';
  let belumLunas = false;
  let sortParam = '';
  let clientFilter = null;

  if (quickFilter === 'belum_lunas') {
    belumLunas = true;
    sortParam = 'tanggal_asc';
  } else if (quickFilter === 'aktif') {
    clientFilter = t => ['pending','proses'].includes(t.status);
  } else if (quickFilter === 'selesai') {
    status = 'selesai';
  } else if (quickFilter === 'lewat') {
    clientFilter = isLewat;
  }

  const params = new URLSearchParams({ page, limit: clientFilter ? 200 : 20 });
  if (q)         params.set('q', q);
  if (status)    params.set('status', status);
  if (belumLunas) params.set('belum_lunas', '1');
  if (sortParam) params.set('sort', sortParam);

  document.getElementById('cardList').innerHTML = '<div class="empty"><span class="ic">⏳</span><div class="ttl">Memuat...</div></div>';
  document.getElementById('tableBody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Memuat...</td></tr>';

  try {
    const r = await fetch('/api/v1/transaksi?' + params, { credentials: 'include' });
    if (r.status === 401) { location.href = '/login'; return; }
    const d = await r.json();

    let data = d.data || [];
    const meta = d.meta || {};

    if (clientFilter) data = data.filter(clientFilter);

    const totalAll = clientFilter ? data.length : (meta.total || 0);
    totalPages = clientFilter ? 1 : Math.max(1, Math.ceil((meta.total || 0) / 20));

    document.getElementById('infoLine').textContent =
      `Menampilkan ${data.length} dari ${totalAll} order`;

    renderCards(data);
    renderTable(data);
    renderPagination(totalAll);
  } catch (err) {
    console.error(err);
    document.getElementById('cardList').innerHTML = '<div class="empty"><span class="ic">⚠️</span><div class="ttl">Gagal memuat data</div></div>';
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Gagal memuat data</td></tr>';
  }
}

function statusLabel(s) {
  return ({ pending: 'PENDING', proses: 'PROSES', selesai: 'SELESAI', diambil: 'DIAMBIL', dibatalkan: 'DIBATALKAN' })[s] || (s || '').toUpperCase();
}

function renderCards(rows) {
  const el = document.getElementById('cardList');
  if (!rows.length) {
    el.innerHTML = renderEmpty();
    return;
  }

  el.innerHTML = rows.map(t => {
    const lunas = (Number(t.bayar) || 0) >= Number(t.total_bayar);
    const lewat = isLewat(t);
    const tel = t.pelanggan_telepon;
    const telDisplay = tampilkanNomor(tel); // Format untuk tampilan: 08xxx
    const cardClass = lewat ? 's-lewat' : 's-' + t.status;
    const layanan = t.layanan_ringkas || '—';
    const pl = JSON.stringify(payload(t)).replace(/'/g, "&#39;");
    const wp = JSON.stringify(waPayload(t)).replace(/'/g, "&#39;");

    let actions = '';
    // Tombol status
    if (t.status === 'pending') {
      actions += `<button class="btn btn-proses" onclick="updateStatus(${t.id},'proses',this)">▶ Proses</button>`;
      actions += `<button class="btn btn-selesai" onclick="updateStatus(${t.id},'selesai',this)">✓ Selesai</button>`;
    } else if (t.status === 'proses') {
      actions += `<button class="btn btn-selesai" onclick="updateStatus(${t.id},'selesai',this)">✓ Selesai</button>`;
    } else if (t.status === 'selesai') {
      actions += `<button class="btn btn-selesai" onclick="updateStatus(${t.id},'diambil',this)">✓ Diambil</button>`;
    }

    // Tombol lunasi (jika belum lunas dan belum dibatalkan)
    if (!lunas && t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-lunasi" onclick='openLunasiSheet(${pl})'>💰 Lunasi</button>`;
    }

    // Tombol WA (tampil di semua card selama ada nomor telepon, kecuali tamu/dibatalkan)
    if (tel && t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-wa" onclick='openWaSheet(${wp})'>💬 WA</button>`;
    }

    // Tombol Label (selalu ada kecuali dibatalkan)
    if (t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-label" onclick="openLabelSheet(${t.id})">🏷️ Label</button>`;
    }

    // Tombol detail (selalu ada)
    actions += `<a class="btn btn-detail" href="/order/detail?id=${t.id}" title="Detail">›</a>`;

    return `
    <div class="order-card ${cardClass}">
      <div class="oc-body">
        <div class="oc-row1">
          <div class="oc-nomor">${escHtml(t.nomor_transaksi)}</div>
          <div class="oc-tgl">${fmtDateShort(t.tanggal_masuk)}</div>
        </div>
        <div class="oc-nama">
          ${escHtml(t.pelanggan_nama || 'Non-member')}
          ${telDisplay ? `<span class="tel"> · ${escHtml(telDisplay)}</span>` : ''}
        </div>
        <div class="oc-svc">
          <span class="layanan" title="${escHtml(layanan)}">${escHtml(layanan)}</span>
          <span class="total">${fmtRp(t.total_bayar)}</span>
        </div>
        <div class="oc-badges">
          <span class="ds-badge ds-badge-${t.status}">● ${statusLabel(t.status)}</span>
          ${!lunas ? `<span class="ds-badge ds-badge-belum">💰 BELUM LUNAS</span>` : `<span class="ds-badge ds-badge-lunas">✓ LUNAS</span>`}
          ${lewat ? `<span class="ds-badge ds-badge-belum">🔴 LEWAT WAKTU</span>` : ''}
        </div>
      </div>
      ${actions ? `<div class="oc-actions">${actions}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Tidak ada order</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(t => {
    const lunas = (Number(t.bayar) || 0) >= Number(t.total_bayar);
    const lewat = isLewat(t);
    const tel = t.pelanggan_telepon;
    const telDisplay = tampilkanNomor(tel); // Format untuk tampilan: 08xxx
    const pl = JSON.stringify(payload(t)).replace(/'/g, "&#39;");
    const wp = JSON.stringify(waPayload(t)).replace(/'/g, "&#39;");

    let actions = '';
    if (t.status === 'pending') {
      actions += `<button class="btn btn-proses" onclick="updateStatus(${t.id},'proses',this)">▶ Proses</button>`;
    } else if (t.status === 'proses') {
      actions += `<button class="btn btn-selesai" onclick="updateStatus(${t.id},'selesai',this)">✓ Selesai</button>`;
    } else if (t.status === 'selesai') {
      actions += `<button class="btn btn-selesai" onclick="updateStatus(${t.id},'diambil',this)">✓ Diambil</button>`;
    }
    if (!lunas && t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-lunasi" onclick='openLunasiSheet(${pl})'>💰</button>`;
    }
    // Tombol WA tampil di semua card selama ada nomor telepon, kecuali dibatalkan
    if (tel && t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-wa" onclick='openWaSheet(${wp})'>💬</button>`;
    }
    // Tombol Label (selalu ada kecuali dibatalkan)
    if (t.status !== 'dibatalkan') {
      actions += `<button class="btn btn-label" onclick="openLabelSheet(${t.id})">🏷️</button>`;
    }
    actions += `<a class="btn btn-detail" href="/order/detail?id=${t.id}">›</a>`;

    return `<tr>
      <td>
        <div class="td-nomor"><a href="/order/detail?id=${t.id}">${escHtml(t.nomor_transaksi)}</a></div>
        <div class="td-meta">${escHtml(t.kasir_nama || '—')}</div>
      </td>
      <td>
        <div>${escHtml(t.pelanggan_nama || 'Non-member')}</div>
        ${telDisplay ? `<div class="td-meta">${escHtml(telDisplay)}</div>` : ''}
      </td>
      <td><div style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;" title="${escHtml(t.layanan_ringkas || '')}">${escHtml(t.layanan_ringkas || '—')}</div></td>
      <td style="font-weight:700;white-space:nowrap;">${fmtRp(t.total_bayar)}</td>
      <td>
        <span class="ds-badge ${lunas ? 'ds-badge-lunas' : 'ds-badge-belum'}">${lunas ? 'Lunas' : 'Belum'}</span>
        ${!lunas ? `<div class="td-meta">Sisa ${fmtRp(t.total_bayar - t.bayar)}</div>` : ''}
      </td>
      <td>
        <span class="ds-badge ds-badge-${t.status}">${t.status}</span>
        ${lewat ? `<div class="td-meta" style="color:var(--danger);font-weight:700;">🔴 Lewat</div>` : ''}
      </td>
      <td style="white-space:nowrap;font-size:12px;">${fmtDate(t.tanggal_selesai)}</td>
      <td class="td-actions-cell">${actions}</td>
    </tr>`;
  }).join('');
}

function renderEmpty() {
  const labels = {
    semua: 'order',
    aktif: 'order aktif',
    selesai: 'order selesai',
    lewat: 'order lewat waktu',
    belum_lunas: 'order belum lunas'
  };
  const lbl = labels[quickFilter] || 'order';
  return `
    <div class="empty">
      <span class="ic">📭</span>
      <div class="ttl">Tidak ada ${lbl}</div>
      <div class="sub">Belum ada data untuk filter ini</div>
      <a href="/order/baru" class="btn">+ Buat Order Baru</a>
    </div>`;
}

function renderPagination(total) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';

  let html = `<button class="pg-btn" onclick="loadOrders(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹</button>`;
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += `<button class="pg-btn" onclick="loadOrders(1)">1</button>`;
  if (start > 2) html += `<span style="padding:0 4px;color:var(--gray-5)">…</span>`;
  for (let p = start; p <= end; p++) {
    html += `<button class="pg-btn ${p === currentPage ? 'active' : ''}" onclick="loadOrders(${p})">${p}</button>`;
  }
  if (end < totalPages - 1) html += `<span style="padding:0 4px;color:var(--gray-5)">…</span>`;
  if (end < totalPages) html += `<button class="pg-btn" onclick="loadOrders(${totalPages})">${totalPages}</button>`;
  html += `<button class="pg-btn" onclick="loadOrders(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>›</button>`;
  el.innerHTML = html;
}

async function updateStatus(id, status, btn) {
  if (!confirm(`Ubah status ke "${status}"?`)) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/v1/transaksi/${id}/status`, {
      method: 'PUT', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const d = await r.json();
    if (!r.ok) { showToast('Gagal: ' + d.error); return; }
    showToast('Status → "' + status + '"');
    loadOrders(currentPage);
    loadCounts();
  } catch { showToast('Koneksi gagal'); }
  finally { btn.disabled = false; }
}

// Pill click
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    quickFilter = p.dataset.quick;
    loadOrders(1);
  });
});

// URL param pre-filter
const urlParams = new URLSearchParams(location.search);
const qpParam = urlParams.get('quick') || urlParams.get('status');
if (qpParam && ['semua','aktif','selesai','lewat','belum_lunas'].includes(qpParam)) {
  quickFilter = qpParam;
  document.querySelectorAll('.pill').forEach(x => x.classList.toggle('active', x.dataset.quick === qpParam));
}

// Reload setelah lunasi
window.addEventListener('lunasi:done', () => {
  showToast('✓ Pembayaran tersimpan');
  loadOrders(currentPage);
  loadCounts();
});

loadCounts();
loadOrders(1);
</script>
