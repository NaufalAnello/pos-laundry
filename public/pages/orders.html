<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/css/design-system.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/responsive.css"/>
  <title>Antrian — POS Laundry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--gray-2); color: var(--gray-9); font-size: 14px; min-height: 100vh; }

    .page { max-width: 1200px; margin: 0 auto; padding: 0 0 100px; }

    /* ── Sticky Header ─────────────────────────────────── */
    .ord-head {
      position: sticky; top: 0; z-index: 20;
      background: #fff; border-bottom: 1px solid var(--gray-3);
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .ord-head-top {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px 10px;
    }
    .ord-back {
      width: 40px; height: 40px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; color: var(--gray-7); border: none;
      text-decoration: none; font-size: 20px; cursor: pointer;
      flex-shrink: 0;
    }
    .ord-back:hover { background: var(--gray-2); }
    .ord-head-title {
      flex: 1; font-size: 17px; font-weight: 800; color: var(--gray-9);
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ord-search-btn {
      width: 40px; height: 40px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; color: var(--gray-7); border: none;
      cursor: pointer; font-size: 18px; flex-shrink: 0;
    }
    .ord-search-btn:hover { background: var(--gray-2); }
    .ord-search-btn.active { background: var(--primary-lt); color: var(--primary); }

    .ord-search-wrap {
      padding: 0 14px 10px; display: none;
    }
    .ord-search-wrap.open { display: block; }
    .ord-search-wrap input {
      width: 100%; min-height: 44px; padding: 10px 14px;
      border: 1px solid var(--gray-3); border-radius: 10px;
      background: var(--gray-1); font-size: 14px; font-family: inherit;
      outline: none;
    }
    .ord-search-wrap input:focus { border-color: var(--primary); background: #fff; }

    /* ── Filter pills ───────────────────────────────────── */
    .ord-pills {
      display: flex; gap: 8px; padding: 0 14px 12px;
      overflow-x: auto; scrollbar-width: none;
    }
    .ord-pills::-webkit-scrollbar { display: none; }
    .ord-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 99px;
      border: 1px solid var(--gray-3); background: #fff;
      font-size: 12px; font-weight: 700; color: var(--gray-7);
      cursor: pointer; white-space: nowrap; min-height: 36px;
      font-family: inherit; transition: all .15s;
    }
    .ord-pill:active { transform: scale(.97); }
    .ord-pill.active { background: var(--gray-9); color: #fff; border-color: var(--gray-9); }
    .ord-pill .cnt {
      background: var(--gray-2); color: var(--gray-6);
      padding: 1px 7px; border-radius: 99px;
      font-size: 10px; font-weight: 800;
    }
    .ord-pill.active .cnt { background: rgba(255,255,255,.25); color: #fff; }
    .ord-pill.danger.active { background: var(--danger); border-color: var(--danger); }
    .ord-pill.warning.active { background: var(--warning); border-color: var(--warning); }

    /* ── Body ───────────────────────────────────────────── */
    .body-wrap { padding: 14px; }
    .ord-info {
      font-size: 12px; color: var(--gray-5); margin-bottom: 10px;
    }

    /* ── Order Card ─────────────────────────────────────── */
    .ord-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--gray-3); border-left: 3px solid var(--gray-4);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .ord-card.pending  { border-left-color: var(--gray-4); }
    .ord-card.proses   { border-left-color: var(--primary); }
    .ord-card.selesai  { border-left-color: var(--success); }
    .ord-card.diambil  { border-left-color: var(--gray-3); opacity: .85; }
    .ord-card.dibatalkan { border-left-color: var(--gray-3); opacity: .75; }
    .ord-card.lewat    { border-left-color: var(--danger); }

    .ord-card-body {
      padding: 12px 14px;
      cursor: pointer;
    }
    .ord-card-row1 {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px;
    }
    .ord-card-nomor { font-size: 14px; font-weight: 800; color: var(--gray-9); }
    .ord-card-tgl {
      font-size: 11px; color: var(--gray-5); white-space: nowrap;
    }
    .ord-card-pelanggan {
      font-size: 12px; color: var(--gray-6); margin-top: 4px;
      line-height: 1.4; word-break: break-word;
    }
    .ord-card-pelanggan .nama { font-weight: 700; color: var(--gray-7); }
    .ord-card-layanan {
      font-size: 12px; color: var(--gray-6); margin-top: 4px;
      display: flex; justify-content: space-between; gap: 10px;
    }
    .ord-card-layanan .items {
      flex: 1; min-width: 0; word-break: break-word; line-height: 1.4;
    }
    .ord-card-layanan .amt {
      font-size: 14px; font-weight: 800; color: var(--gray-9); white-space: nowrap;
    }
    .ord-card-badges {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 8px;
    }
    .ord-card-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px;
    }
    .ord-card-badge .dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .badge-st-pending    { background: var(--gray-2); color: var(--gray-6); }
    .badge-st-proses     { background: var(--primary-lt); color: var(--primary); }
    .badge-st-selesai    { background: var(--success-lt); color: var(--success); }
    .badge-st-diambil    { background: var(--gray-2); color: var(--gray-6); }
    .badge-st-dibatalkan { background: var(--danger-lt); color: var(--danger); }
    .badge-pay-belum     { background: var(--danger-lt); color: var(--danger); }
    .badge-pay-lunas     { background: var(--success-lt); color: var(--success); }
    .badge-telat         { background: var(--danger); color: #fff; }

    /* ── Actions ────────────────────────────────────────── */
    .ord-card-actions {
      display: flex; gap: 6px; padding: 0 14px 12px;
      flex-wrap: wrap;
    }
    .ord-act {
      flex: 1 1 auto; min-width: 80px;
      min-height: 40px; padding: 8px 10px;
      border: 1px solid transparent; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 4px; font-family: inherit; text-decoration: none;
      transition: opacity .15s;
    }
    .ord-act:active { transform: scale(.98); }
    .ord-act.proses  { background: var(--primary); color: #fff; }
    .ord-act.selesai { background: var(--success); color: #fff; }
    .ord-act.diambil { background: var(--gray-7); color: #fff; }
    .ord-act.lunasi  { background: var(--success); color: #fff; }
    .ord-act.wa      { background: #25d366; color: #fff; }
    .ord-act.detail  {
      background: #fff; border-color: var(--gray-3); color: var(--gray-6);
      flex: 0 0 44px; min-width: 44px; padding: 0;
    }
    .ord-act.detail:hover { background: var(--gray-1); }

    /* ── Empty ──────────────────────────────────────────── */
    .ord-empty {
      text-align: center; padding: 40px 20px;
      background: #fff; border-radius: 12px;
      border: 1px dashed var(--gray-3);
    }
    .ord-empty .ic {
      font-size: 56px; display: block; margin-bottom: 12px; opacity: .8;
    }
    .ord-empty h3 {
      font-size: 16px; font-weight: 700; color: var(--gray-7);
      margin-bottom: 6px;
    }
    .ord-empty p {
      font-size: 13px; color: var(--gray-5); margin-bottom: 16px;
    }
    .ord-empty .btn-new {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; background: var(--primary); color: #fff;
      border-radius: 99px; text-decoration: none;
      font-size: 13px; font-weight: 700;
    }

    /* ── Pagination ─────────────────────────────────────── */
    .pagination {
      display: flex; justify-content: center; gap: 4px;
      margin-top: 16px; flex-wrap: wrap;
    }
    .page-btn {
      min-width: 38px; min-height: 38px; padding: 0 10px;
      border: 1px solid var(--gray-3); border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 13px; font-weight: 700;
      color: var(--gray-7); font-family: inherit;
    }
    .page-btn:hover { background: var(--gray-1); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ──────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--gray-9); color: #fff; padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    #toast.show { opacity: 1; }

    /* ══════════════════════════════════════════════════════
       LAPTOP (≥1024px) — pakai tabel
       ══════════════════════════════════════════════════════ */
    @media (min-width: 1024px) {
      .desktop-only { display: block; }
      .mobile-only  { display: none !important; }

      .body-wrap { padding: 20px; }

      .ord-info {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 14px;
      }
      .ord-info .btn-new {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 9px 16px; background: var(--primary); color: #fff;
        border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 700;
      }

      .ord-table-card {
        background: #fff; border-radius: 12px; border: 1px solid var(--gray-3);
        box-shadow: var(--shadow-sm); overflow: hidden;
      }
      .ord-table-wrap { overflow-x: auto; }
      table.ord-table { width: 100%; border-collapse: collapse; }
      table.ord-table thead th {
        padding: 11px 14px; text-align: left;
        font-size: 11px; font-weight: 700; color: var(--gray-5);
        text-transform: uppercase; letter-spacing: .4px;
        background: var(--gray-1); border-bottom: 1px solid var(--gray-3);
        white-space: nowrap;
      }
      table.ord-table tbody tr {
        border-bottom: 1px solid var(--gray-2); transition: background .1s; cursor: pointer;
      }
      table.ord-table tbody tr:hover { background: var(--gray-1); }
      table.ord-table tbody tr:last-child { border-bottom: none; }
      table.ord-table tbody td {
        padding: 12px 14px; font-size: 13px; vertical-align: middle;
      }
      table.ord-table .td-actions {
        display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;
      }
      table.ord-table .td-actions .ord-act {
        min-height: 32px; padding: 4px 10px; font-size: 11px; min-width: 0; flex: 0 0 auto;
      }
      table.ord-table .td-actions .ord-act.detail { flex: 0 0 32px; min-width: 32px; }
    }
    @media (max-width: 1023px) {
      .desktop-only { display: none !important; }
    }
  </style>
</head>
<body>

<div class="page">
  <!-- HEADER -->
  <div class="ord-head">
    <div class="ord-head-top">
      <a class="ord-back" href="/" title="Kembali">←</a>
      <div class="ord-head-title">Antrian</div>
      <button class="ord-search-btn" id="searchToggle" title="Cari">🔍</button>
    </div>
    <div class="ord-search-wrap" id="searchWrap">
      <input type="text" id="searchInput" placeholder="Cari nomor order / nama pelanggan..." autocomplete="off"/>
    </div>
    <div class="ord-pills" id="pillRow">
      <button class="ord-pill active" data-filter="semua">Semua <span class="cnt" id="cntSemua">0</span></button>
      <button class="ord-pill" data-filter="aktif">Aktif <span class="cnt" id="cntAktif">0</span></button>
      <button class="ord-pill" data-filter="selesai">Selesai <span class="cnt" id="cntSelesai">0</span></button>
      <button class="ord-pill danger" data-filter="lewat">🔴 Lewat Waktu <span class="cnt" id="cntLewat">0</span></button>
      <button class="ord-pill warning" data-filter="belum_lunas">💰 Belum Lunas <span class="cnt" id="cntBelumLunas">0</span></button>
    </div>
  </div>

  <div class="body-wrap">
    <div class="ord-info" id="infoBar">
      <span id="infoText">Memuat...</span>
      <a href="/order/baru" class="btn-new desktop-only">+ Order Baru</a>
    </div>

    <!-- MOBILE: card list -->
    <div class="mobile-only" id="cardList"></div>

    <!-- LAPTOP: table -->
    <div class="ord-table-card desktop-only">
      <div class="ord-table-wrap">
        <table class="ord-table">
          <thead>
            <tr>
              <th>No. Order</th>
              <th>Pelanggan</th>
              <th>Layanan</th>
              <th>Total</th>
              <th>Status</th>
              <th>Bayar</th>
              <th>Est. Selesai</th>
              <th style="text-align:right">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const fmtRp = n => 'Rp ' + Number(n || 0).toLocaleString('id-ID');
const fmtRpShort = n => {
  n = Number(n || 0);
  if (n >= 1_000_000) return 'Rp ' + (n / 1_000_000).toFixed(1).replace('.0','') + 'jt';
  if (n >= 1_000)     return 'Rp ' + Math.round(n / 1_000) + 'rb';
  return 'Rp ' + n.toLocaleString('id-ID');
};
const fmtDate = s => s ? new Date(s).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }) : '—';
const fmtDateShort = s => s ? new Date(s).toLocaleDateString('id-ID', { day:'2-digit', month:'short' }) : '—';
const escHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let allData = [];      // semua transaksi (limit 500)
let filtered = [];
let activeFilter = 'belum_lunas'; // default sesuai prioritas operasional
let searchQuery = '';
let currentPage = 1;
const PAGE_SIZE = 20;
let debTimer = null;

function showToast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
window.showToast = showToast;

/* ── Filter helpers ──────────────────────────────────── */
function isLewat(t) {
  if (!['pending','proses'].includes(t.status)) return false;
  if (!t.tanggal_selesai) return false;
  const est = new Date(t.tanggal_selesai); est.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  return est < today;
}
function isLunas(t) {
  return Number(t.bayar || 0) >= Number(t.total_bayar || 0);
}

function applyFilter(data, key) {
  if (key === 'semua')        return data;
  if (key === 'aktif')        return data.filter(t => ['pending','proses'].includes(t.status));
  if (key === 'selesai')      return data.filter(t => t.status === 'selesai');
  if (key === 'lewat')        return data.filter(isLewat);
  if (key === 'belum_lunas')  return data.filter(t => !isLunas(t) && !['dibatalkan'].includes(t.status));
  return data;
}

function updatePillCounts() {
  const counts = {
    semua: allData.length,
    aktif: applyFilter(allData, 'aktif').length,
    selesai: applyFilter(allData, 'selesai').length,
    lewat: applyFilter(allData, 'lewat').length,
    belum_lunas: applyFilter(allData, 'belum_lunas').length,
  };
  document.getElementById('cntSemua').textContent       = counts.semua;
  document.getElementById('cntAktif').textContent       = counts.aktif;
  document.getElementById('cntSelesai').textContent     = counts.selesai;
  document.getElementById('cntLewat').textContent       = counts.lewat;
  document.getElementById('cntBelumLunas').textContent  = counts.belum_lunas;
}

/* ── Render ──────────────────────────────────────────── */
function lunasiPayload(t) {
  return {
    id: t.id, nomor: t.nomor_transaksi, nama: t.pelanggan_nama,
    total: t.total_bayar, dibayar: t.bayar, pelanggan_id: t.pelanggan_id
  };
}
function waPayload(t) {
  return { id: t.id, nomor: t.nomor_transaksi, nama: t.pelanggan_nama, telepon: t.pelanggan_telepon };
}

function actionsHtml(t, layout) {
  const lunas = isLunas(t);
  const tel = t.pelanggan_telepon;
  const tidakBoleh = t.status === 'dibatalkan';
  const pl = JSON.stringify(lunasiPayload(t)).replace(/'/g, "&#39;");
  const wp = JSON.stringify(waPayload(t)).replace(/'/g, "&#39;");

  const acts = [];

  // Aksi status sesuai konteks
  if (t.status === 'pending') {
    acts.push(`<button class="ord-act proses" onclick='event.stopPropagation();updateStatus(${t.id},"proses",this)'>▶ Proses</button>`);
    acts.push(`<button class="ord-act selesai" onclick='event.stopPropagation();updateStatus(${t.id},"selesai",this)'>✓ Selesai</button>`);
  } else if (t.status === 'proses') {
    acts.push(`<button class="ord-act selesai" onclick='event.stopPropagation();updateStatus(${t.id},"selesai",this)'>✓ Selesai</button>`);
  } else if (t.status === 'selesai') {
    acts.push(`<button class="ord-act diambil" onclick='event.stopPropagation();updateStatus(${t.id},"diambil",this)'>✓ Diambil</button>`);
    if (tel) acts.push(`<button class="ord-act wa" onclick='event.stopPropagation();openWaSheet(${wp})'>💬 WA Siap Diambil</button>`);
  }
  // diambil & dibatalkan: tidak ada aksi status

  // Lunasi: muncul untuk semua kecuali dibatalkan, selama belum lunas
  if (!lunas && !tidakBoleh) {
    acts.push(`<button class="ord-act lunasi" onclick='event.stopPropagation();openLunasiSheet(${pl})'>💰 Lunasi</button>`);
  }

  // WA umum: kalau ada telepon dan belum disebut di selesai
  if (tel && t.status !== 'selesai') {
    acts.push(`<button class="ord-act wa" onclick='event.stopPropagation();openWaSheet(${wp})'>💬 WA</button>`);
  }

  // Detail
  acts.push(`<a class="ord-act detail" href="/order/detail?id=${t.id}" onclick='event.stopPropagation()' title="Detail">›</a>`);

  return acts.join('');
}

function renderCardList(rows) {
  const el = document.getElementById('cardList');
  if (!rows.length) {
    el.innerHTML = `
      <div class="ord-empty">
        <span class="ic">${emptyIcon()}</span>
        <h3>${emptyTitle()}</h3>
        <p>${emptyDesc()}</p>
        <a href="/order/baru" class="btn-new">+ Buat Order Baru</a>
      </div>`;
    return;
  }

  el.innerHTML = rows.map(t => {
    const lewat = isLewat(t);
    const lunas = isLunas(t);
    const itemsText = (t.layanan_ringkas || (t.items || []).map(i => `${i.jumlah}${i.satuan ? ' ' + i.satuan : ''} ${i.nama_layanan}`).join(', ')) || '—';
    const klass = lewat ? 'lewat' : t.status;
    return `
    <div class="ord-card ${klass}">
      <div class="ord-card-body" onclick="goDetail(${t.id}, event)">
        <div class="ord-card-row1">
          <div class="ord-card-nomor">${t.nomor_transaksi}</div>
          <div class="ord-card-tgl">${fmtDateShort(t.tanggal_masuk)}</div>
        </div>
        <div class="ord-card-pelanggan">
          <span class="nama">${escHtml(t.pelanggan_nama || 'Non-member')}</span>${t.pelanggan_telepon ? ' · ' + escHtml(t.pelanggan_telepon) : ''}
        </div>
        <div class="ord-card-layanan">
          <span class="items">${escHtml(itemsText)}</span>
          <span class="amt">${fmtRp(t.total_bayar)}</span>
        </div>
        <div class="ord-card-badges">
          <span class="ord-card-badge badge-st-${t.status}"><span class="dot"></span>${t.status.toUpperCase()}</span>
          ${lunas
            ? `<span class="ord-card-badge badge-pay-lunas">💰 LUNAS</span>`
            : (t.status !== 'dibatalkan' ? `<span class="ord-card-badge badge-pay-belum">💰 BELUM LUNAS</span>` : '')}
          ${lewat ? `<span class="ord-card-badge badge-telat">🔴 LEWAT WAKTU</span>` : ''}
        </div>
      </div>
      <div class="ord-card-actions">
        ${actionsHtml(t, 'card')}
      </div>
    </div>`;
  }).join('');
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="ord-empty" style="border:none;padding:40px 20px">
        <span class="ic">${emptyIcon()}</span>
        <h3>${emptyTitle()}</h3>
        <p>${emptyDesc()}</p>
        <a href="/order/baru" class="btn-new">+ Buat Order Baru</a>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(t => {
    const lewat = isLewat(t);
    const lunas = isLunas(t);
    const itemsText = (t.layanan_ringkas || (t.items || []).map(i => `${i.jumlah}${i.satuan ? ' ' + i.satuan : ''} ${i.nama_layanan}`).join(', ')) || '—';
    return `
    <tr onclick="goDetail(${t.id}, event)" style="border-left:3px solid ${lewat ? 'var(--danger)' : statusColor(t.status)}">
      <td>
        <div style="font-weight:800">${t.nomor_transaksi}</div>
        <div style="font-size:11px;color:var(--gray-5)">${fmtDate(t.tanggal_masuk)}</div>
      </td>
      <td>
        <div>${escHtml(t.pelanggan_nama || '—')}</div>
        ${t.pelanggan_telepon ? `<div style="font-size:11px;color:var(--gray-5)">${escHtml(t.pelanggan_telepon)}</div>` : ''}
      </td>
      <td style="max-width:200px;font-size:12px;color:var(--gray-6)" title="${escHtml(itemsText)}">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(itemsText)}</div>
      </td>
      <td style="white-space:nowrap;font-weight:700">${fmtRp(t.total_bayar)}</td>
      <td>
        <span class="ord-card-badge badge-st-${t.status}"><span class="dot"></span>${t.status}</span>
        ${lewat ? `<div style="margin-top:4px"><span class="ord-card-badge badge-telat">🔴 LEWAT</span></div>` : ''}
      </td>
      <td>
        ${lunas
          ? `<span class="ord-card-badge badge-pay-lunas">LUNAS</span>`
          : (t.status !== 'dibatalkan'
              ? `<span class="ord-card-badge badge-pay-belum">BELUM</span><div style="font-size:11px;color:var(--gray-5);margin-top:2px">Sisa ${fmtRp(t.total_bayar - t.bayar)}</div>`
              : '—')}
      </td>
      <td style="font-size:12px;color:var(--gray-6);white-space:nowrap">${fmtDate(t.tanggal_selesai)}</td>
      <td>
        <div class="td-actions">${actionsHtml(t, 'table')}</div>
      </td>
    </tr>`;
  }).join('');
}

function statusColor(s) {
  return {
    pending: 'var(--gray-4)',
    proses: 'var(--primary)',
    selesai: 'var(--success)',
    diambil: 'var(--gray-3)',
    dibatalkan: 'var(--gray-3)',
  }[s] || 'var(--gray-3)';
}

function emptyIcon() {
  return ({
    semua: '📦',
    aktif: '✨',
    selesai: '🧺',
    lewat: '👍',
    belum_lunas: '✅',
  }[activeFilter] || '📭');
}
function emptyTitle() {
  return ({
    semua: 'Belum ada order',
    aktif: 'Tidak ada order aktif',
    selesai: 'Tidak ada order yang sudah selesai',
    lewat: 'Tidak ada order lewat waktu',
    belum_lunas: 'Semua tagihan sudah lunas',
  }[activeFilter] || 'Tidak ada order');
}
function emptyDesc() {
  if (searchQuery) return `Tidak ada order yang cocok dengan "${escHtml(searchQuery)}"`;
  return 'Buat order baru untuk mulai mencatat transaksi laundry.';
}

/* ── Pagination ──────────────────────────────────────── */
function renderPagination() {
  const el = document.getElementById('pagination');
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(totalPages, currentPage + 2);
  let html = `<button class="page-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹</button>`;
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if (start > 2) html += `<span style="padding:0 4px;align-self:center;color:var(--gray-5)">…</span>`;
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (end < totalPages - 1) html += `<span style="padding:0 4px;align-self:center;color:var(--gray-5)">…</span>`;
  if (end < totalPages) html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">›</button>`;
  el.innerHTML = html;
}

window.goPage = p => {
  currentPage = p;
  rerender();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.goDetail = (id, ev) => {
  if (ev && ev.target.closest('button, a.ord-act')) return;
  location.href = `/order/detail?id=${id}`;
};

/* ── Render orchestrator ─────────────────────────────── */
function rerender() {
  // Search filter
  let f = applyFilter(allData, activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(t => (
      (t.nomor_transaksi || '').toLowerCase().includes(q) ||
      (t.pelanggan_nama || '').toLowerCase().includes(q) ||
      (t.pelanggan_telepon || '').includes(q)
    ));
  }
  // Sort: belum_lunas/lewat → terlama dulu (urgent); lainnya → terbaru dulu
  if (['belum_lunas','lewat'].includes(activeFilter)) {
    f = [...f].sort((a, b) => new Date(a.tanggal_masuk) - new Date(b.tanggal_masuk));
  } else {
    f = [...f].sort((a, b) => new Date(b.tanggal_masuk) - new Date(a.tanggal_masuk));
  }
  filtered = f;

  // Info bar
  document.getElementById('infoText').textContent =
    `Menampilkan ${filtered.length} order${searchQuery ? ' untuk "' + searchQuery + '"' : ''}`;

  // Slice for pagination
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  renderCardList(slice);
  renderTable(slice);
  renderPagination();
}

/* ── Update status ───────────────────────────────────── */
async function updateStatus(id, status, btn) {
  if (!confirm(`Ubah status order ke "${status}"?`)) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/v1/transaksi/${id}/status`, {
      method: 'PUT', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const d = await r.json();
    if (!r.ok) { showToast('Gagal: ' + d.error); return; }
    showToast(`Status → "${status}"`);
    await loadOrders();
  } catch { showToast('Koneksi gagal'); }
  finally { btn.disabled = false; }
}
window.updateStatus = updateStatus;

/* ── Loader ──────────────────────────────────────────── */
async function loadOrders() {
  document.getElementById('infoText').textContent = 'Memuat...';
  try {
    // Ambil hingga 500 order terbaru untuk derive count semua filter client-side
    const r = await fetch('/api/v1/transaksi?limit=500&sort=tanggal_desc', { credentials: 'include' });
    if (r.status === 401) { location.href = '/login'; return; }
    const d = await r.json();
    allData = d.data || [];
    updatePillCounts();
    currentPage = 1;
    rerender();
  } catch (err) {
    console.error(err);
    document.getElementById('infoText').textContent = 'Gagal memuat data';
  }
}

/* ── Pill click ──────────────────────────────────────── */
document.querySelectorAll('.ord-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.ord-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.filter;
    currentPage = 1;
    rerender();
  });
});

/* ── Search toggle ───────────────────────────────────── */
document.getElementById('searchToggle').addEventListener('click', () => {
  const wrap = document.getElementById('searchWrap');
  const btn = document.getElementById('searchToggle');
  const open = !wrap.classList.contains('open');
  wrap.classList.toggle('open', open);
  btn.classList.toggle('active', open);
  if (open) document.getElementById('searchInput').focus();
});

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debTimer);
  debTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    currentPage = 1;
    rerender();
  }, 200);
});

/* ── URL params ──────────────────────────────────────── */
const urlParams = new URLSearchParams(location.search);
const qpParam = urlParams.get('quick') || urlParams.get('status');
if (['semua','aktif','selesai','lewat','belum_lunas'].includes(qpParam)) {
  activeFilter = qpParam;
} else if (qpParam === 'belum_lunas') {
  activeFilter = 'belum_lunas';
}
document.querySelectorAll('.ord-pill').forEach(p => {
  p.classList.toggle('active', p.dataset.filter === activeFilter);
});

/* ── Lunasi callback ─────────────────────────────────── */
window.addEventListener('lunasi:done', () => {
  showToast('✓ Pembayaran tersimpan');
  loadOrders();
});

loadOrders();
</script>
<script src="/js/nav.js"></script>
</body>
</html>
