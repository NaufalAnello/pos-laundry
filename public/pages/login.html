<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — POS Laundry</title>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page, #F0F7FF);
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      animation: slideUp .3s ease;
    }
    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
      line-height: 1;
    }
    .brand h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--gray-9, #1E2A6E);
      letter-spacing: -.3px;
    }
    .brand p {
      font-size: 14px;
      color: var(--gray-5, #64748b);
      margin-top: 4px;
    }

    /* ── Fields ── */
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-7, #374151);
      margin-bottom: 6px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 12px;
      border: 1px solid var(--gray-3, #e2e8f0);
      border-radius: var(--radius-md, 8px);
      font-size: 16px;
      color: var(--gray-9, #1E2A6E);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: var(--secondary, #4BB8FA);
      box-shadow: 0 0 0 3px rgba(75, 184, 250, .15);
    }
    .input-wrap input.error {
      border-color: var(--danger, #EF4444);
    }
    .input-wrap input.error:focus {
      box-shadow: 0 0 0 3px rgba(220, 38, 38, .12);
    }
    .input-wrap input::placeholder {
      color: var(--gray-4, #94a3b8);
    }

    .toggle-pwd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      color: var(--gray-4, #94a3b8);
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .toggle-pwd:hover { color: var(--gray-6, #334155); }

    /* ── Error box ── */
    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--danger-lt, #FEF2F2);
      border: 1px solid #fecaca;
      color: var(--danger-dk, #DC2626);
      border-radius: var(--radius-md, 8px);
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 18px;
      animation: shake .35s ease;
    }
    .error-msg.hidden { display: none; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      height: 48px;
      background: var(--primary, #2D3BB5);
      color: #fff;
      border: none;
      border-radius: var(--radius-md, 8px);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) {
      background: var(--primary-dk, #1E2A8A);
    }
    .btn-login:active:not(:disabled) { transform: scale(.98); }
    .btn-login:disabled {
      background: #4BB8FA;
      cursor: not-allowed;
    }

    .btn-text { transition: opacity .2s; }
    .btn-spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .btn-login.loading .btn-text    { opacity: 0; }
    .btn-login.loading .btn-spinner { display: flex; }

    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--gray-4, #94a3b8);
    }

    /* ── Auth check overlay ── */
    #authCheck {
      position: fixed;
      inset: 0;
      background: var(--primary, #2D3BB5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      transition: opacity .3s;
    }
    #authCheck.hidden { opacity: 0; pointer-events: none; }
    #authCheck .dot-wrap { display: flex; gap: 10px; }
    #authCheck .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: rgba(255,255,255,.7);
      animation: bounce .9s infinite ease-in-out;
    }
    #authCheck .dot:nth-child(2) { animation-delay: .15s; }
    #authCheck .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40%            { transform: scale(1);  opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="authCheck" aria-hidden="true">
    <div class="dot-wrap">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="card" role="main">
    <div class="brand">
      <span class="brand-icon">🧺</span>
      <h1>Nala Laundry</h1>
      <p>Masuk ke akun Anda</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Masukkan username"
            autocomplete="username"
            autofocus
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          />
          <button type="button" id="togglePwd" class="toggle-pwd" aria-label="Tampilkan password">
            <span id="eyeIcon">🙈</span>
          </button>
        </div>
      </div>

      <div id="errorMsg" class="error-msg hidden" role="alert">
        <span>⚠️</span>
        <span id="errorText"></span>
      </div>

      <button type="submit" id="submitBtn" class="btn-login">
        <span class="btn-text">Masuk</span>
        <span class="btn-spinner" aria-hidden="true">
          <span class="spinner"></span>
        </span>
      </button>
    </form>

    <p class="footer-text">POS Laundry v1.0</p>
  </div>

  <script>
    const authCheck  = document.getElementById('authCheck');
    const form       = document.getElementById('loginForm');
    const submitBtn  = document.getElementById('submitBtn');
    const errorMsg   = document.getElementById('errorMsg');
    const errorText  = document.getElementById('errorText');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');

    // Cek sesi aktif → langsung redirect ke dashboard
    fetch('/api/v1/auth/me', { credentials: 'include' })
      .then(r => {
        if (r.ok) window.location.replace('/');
        else authCheck.classList.add('hidden');
      })
      .catch(() => authCheck.classList.add('hidden'));

    // Toggle visibility password
    document.getElementById('togglePwd').addEventListener('click', () => {
      const isPwd = passwordEl.type === 'password';
      passwordEl.type = isPwd ? 'text' : 'password';
      document.getElementById('eyeIcon').textContent = isPwd ? '👁️' : '🙈';
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
      errorMsg.style.animation = 'none';
      requestAnimationFrame(() => { errorMsg.style.animation = ''; });
      usernameEl.classList.add('error');
      passwordEl.classList.add('error');
    }

    function clearError() {
      errorMsg.classList.add('hidden');
      usernameEl.classList.remove('error');
      passwordEl.classList.remove('error');
    }

    [usernameEl, passwordEl].forEach(el => el.addEventListener('input', clearError));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      if (!username || !password) {
        showError('Username dan password wajib diisi');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        const res = await fetch('/api/v1/auth/login', {
          method:      'POST',
          headers:     { 'Content-Type': 'application/json' },
          credentials: 'include',
          body:        JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login gagal');
          return;
        }

        authCheck.classList.remove('hidden');
        window.location.replace('/');

      } catch {
        showError('Tidak dapat terhubung ke server. Coba lagi.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
