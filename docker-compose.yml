version: '3.8'
services:
  pos-laundry:
    build: .
    container_name: pos-laundry
    ports:
      - "3000:3000"
    restart: unless-stopped
    privileged: true
    # Mount seluruh bus USB agar tidak tergantung path device spesifik
    # (path /dev/bus/usb/XXX/YYY berubah saat printer dicabut/ganti port)
    volumes:
      - pos-data:/app/data
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_PATH=/app/data/laundry.db
      - PRINTER_TYPE=EPSON
      - PRINTER_WIDTH=58
      - PRINTER_HAS_CUTTER=false
volumes:
  pos-data:
    driver: local
